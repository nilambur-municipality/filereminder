<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office File Multi-Entry & Calendar Reminder</title>
    <!-- FontAwesome Icons ലിങ്ക് -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --calendar-color: #4285F4;
            --danger-color: #e74c3c;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white;
            text-align: center;
            padding: 25px 15px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .header p { margin: 8px 0 0 0; opacity: 0.9; font-size: 0.85rem; }
        
        .container {
            max-width: 1000px;
            margin: -15px auto 40px auto;
            padding: 0 10px;
        }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 📱 മൊബൈലിൽ ടേബിൾ മൂവ് ചെയ്യാൻ സഹായിക്കുന്ന പ്രധാന ഭാഗം */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* സൈഡിലേക്ക് സ്ക്രോൾ ചെയ്യാൻ അനുവദിക്കുന്നു */
            -webkit-overflow-scrolling: touch;
            margin-top: 15px;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 750px; /* മൊബൈലിൽ കോളം ചുരുങ്ങിപ്പോകാതിരിക്കാൻ മിനിമം വീതി നൽകി */
        }
        th, td {
            padding: 10px;
            border: 1px solid #e1e8ed;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: #f8f9fa;
            color: var(--primary);
            white-space: nowrap; /* ഹെഡിങ് താഴേക്ക് മറിഞ്ഞു പോകാതിരിക്കാൻ */
        }
        
        input[type="text"], input[type="date"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9rem;
            -webkit-appearance: none; /* ഐഫോൺ സ്റ്റൈൽ മാറ്റാൻ */
        }
        input[type="text"]:focus, input[type="date"]:focus {
            border-color: var(--calendar-color);
            outline: none;
        }
        
        .btn-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column; /* മൊബൈലിൽ ബട്ടണുകൾ ഒന്നിന് താഴെ ഒന്നാക്കാൻ */
            gap: 10px;
        }
        @media (min-width: 600px) {
            .btn-container {
                flex-direction: row; /* കമ്പ്യൂട്ടറിൽ വരുമ്പോൾ ബട്ടണുകൾ സൈഡ് ബൈ സൈഡ് ആകും */
                justify-content: space-between;
            }
        }
        
        button {
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            width: 100%; /* മൊബൈലിൽ ഫുൾ വിഡ്ത് */
        }
        @media (min-width: 600px) {
            button { width: auto; } /* വലിയ സ്ക്രീനിൽ ആവശ്യത്തിന് മാത്രം വലിപ്പം */
        }
        
        .btn-add { background-color: #27ae60; }
        .btn-add:hover { background-color: #219653; }
        .btn-submit { background-color: var(--calendar-color); font-size: 0.95rem; }
        .btn-submit:hover { background-color: #2a65c4; }
        .btn-delete { background-color: var(--danger-color); padding: 8px 12px; }
        
        .row-number {
            font-weight: bold;
            color: #7f8c8d;
            text-align: center;
        }
        .scroll-hint {
            font-size: 0.8rem;
            color: #e67e22;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        @media (min-width: 768px) {
            .scroll-hint { display: none; } /* കമ്പ്യൂട്ടറിൽ ഈ മെസ്സേജ് കാണിക്കില്ല */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-calendar-days"></i> Office File Reminder System</h1>
        <p>വിവരങ്ങൾ ടേബിളിൽ എന്റർ ചെയ്ത് ഗൂഗിൾ കലണ്ടറിലേക്ക് നേരിട്ട് റിമൈൻഡറുകൾ സെറ്റ് ചെയ്യുക</p>
    </div>

    <div class="container">
        
        <div class="card">
            <h2><i class="fa-solid fa-table-list"></i> ഫയൽ വിവരങ്ങൾ ചേർക്കുക (Data Entry)</h2>
            
            <!-- മൊബൈലിൽ കൈകൊണ്ട് നീക്കാൻ ഓർമ്മിപ്പിക്കുന്ന ചെറിയ സൂചന -->
            <div class="scroll-hint">
                <i class="fa-solid fa-arrow-left-right"></i> <span>മൊബൈലിൽ കോളം കാണാൻ ടേബിൾ ഇടത്തോട്ടോ വലത്തോട്ടോ നീക്കുക (Scroll).</span>
            </div>

            <!-- ടേബിൾ സ്ക്രോൾ ചെയ്യാൻ സഹായിക്കുന്ന കവർ (Wrapper) -->
            <div class="table-responsive">
                <table id="entryTable">
                    <thead>
                        <tr>
                            <th style="width: 50px; text-align: center;">No.</th>
                            <th style="width: 250px;"><i class="fa-solid fa-file-signature"></i> Subject (File Name)</th>
                            <th style="width: 150px;"><i class="fa-solid fa-clock"></i> Reporting Date (Deadline)</th>
                            <th style="width: 200px;"><i class="fa-solid fa-comment-dots"></i> Remarks / Notes</th>
                            <th style="width: 80px; text-align: center;"><i class="fa-solid fa-trash"></i> Delete</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="row-number">1</td>
                            <td><input type="text" class="file-subject" placeholder="ഉദാ: Pension file - Ravi"></td>
                            <td><input type="date" class="file-deadline"></td>
                            <td><input type="text" class="file-remarks" placeholder="കുറിപ്പുകൾ..."></td>
                            <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)"><i class="fa-solid fa-trash-can"></i></button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="btn-container">
                <button class="btn-add" onclick="addNewRow()"><i class="fa-solid fa-plus"></i> പുതിയ വരി ചേർക്കുക (Add Row)</button>
                <button class="btn-submit" onclick="submitToCalendar()"><i class="fa-solid fa-calendar-check"></i> Submit to Google Calendar</button>
            </div>
        </div>

    </div>

    <script>
        function setMinDate(inputElement) {
            let today = new Date().toISOString().split('T')[0];
            inputElement.min = today;
        }

        window.onload = function() {
            let firstDateInput = document.querySelector('.file-deadline');
            if(firstDateInput) setMinDate(firstDateInput);
        };

        function addNewRow() {
            let table = document.getElementById("entryTable").getElementsByTagName('tbody')[0];
            let rowCount = table.rows.length;
            let newRow = table.insertRow(rowCount);

            newRow.innerHTML = `
                <td class="row-number">${rowCount + 1}</td>
                <td><input type="text" class="file-subject" placeholder="ഫയലിന്റെ പേര്..."></td>
                <td><input type="date" class="file-deadline"></td>
                <td><input type="text" class="file-remarks" placeholder="കുറിപ്പുകൾ..."></td>
                <td style="text-align: center;"><button class="btn-delete" onclick="deleteRow(this)"><i class="fa-solid fa-trash-can"></i></button></td>
            `;
            
            setMinDate(newRow.querySelector('.file-deadline'));
            updateRowNumbers();
        }

        function updateRowNumbers() {
            let rows = document.getElementById("entryTable").getElementsByTagName('tbody')[0].rows;
            for (let i = 0; i < rows.length; i++) {
                rows[i].getElementsByClassName('row-number')[0].innerText = i + 1;
            }
        }

        function deleteRow(button) {
            let table = document.getElementById("entryTable").getElementsByTagName('tbody')[0];
            if (table.rows.length > 1) {
                let row = button.parentNode.parentNode;
                row.parentNode.removeChild(row);
                updateRowNumbers();
            } else {
                alert("കുറഞ്ഞത് ഒരു വരിയെങ്കിലും ടേബിളിൽ ഉണ്ടായിരിക്കണം.");
            }
        }

        function submitToCalendar() {
            let rows = document.getElementById("entryTable").getElementsByTagName('tbody')[0].rows;
            let filledCount = 0;

            for (let i = 0; i < rows.length; i++) {
                let subject = rows[i].getElementsByClassName('file-subject')[0].value.trim();
                let dateVal = rows[i].getElementsByClassName('file-deadline')[0].value;
                let remarks = rows[i].getElementsByClassName('file-remarks')[0].value.trim();

                if (subject && dateVal) {
                    filledCount++;
                    let formattedDate = dateVal.replace(/-/g, '');
                    
                    let googleCalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent('Office Due: ' + subject)}&dates=${formattedDate}/${formattedDate}&details=${encodeURIComponent(remarks || 'No remarks')}&sf=true&output=xml`;
                    
                    window.open(googleCalUrl, '_blank');
                }
            }

            if (filledCount === 0) {
                alert("ദയവായി കുറഞ്ഞത് ഒരു ഫയലിന്റെയെങ്കിലും Subject, Reporting Date എന്നിവ നൽകുക.");
            }
        }
    </script>
</body>
</html>
